{% extends "base.html" %}

{% block title %}Edit Entry{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card border-0 shadow-sm">

            <div class="card-body p-4">

                <div class="mb-4">

                    <h2 class="mb-1">
                        Edit Journal Entry
                    </h2>

                    <p class="text-muted mb-0">

                        {{ entry.created_at.strftime('%A %d %B %Y') }}

                    </p>

                </div>

                <form method="POST">

                    <div class="mb-4">

                        <label class="form-label">
                            How are you feeling?
                        </label>

                        <select
                            name="mood_score"
                            class="form-select"
                            required>

                            <option value="5"
                                {% if entry.mood_score == 5 %}selected{% endif %}>
                                😁 Great
                            </option>

                            <option value="4"
                                {% if entry.mood_score == 4 %}selected{% endif %}>
                                🙂 Good
                            </option>

                            <option value="3"
                                {% if entry.mood_score == 3 %}selected{% endif %}>
                                😐 Okay
                            </option>

                            <option value="2"
                                {% if entry.mood_score == 2 %}selected{% endif %}>
                                😔 Low
                            </option>

                            <option value="1"
                                {% if entry.mood_score == 1 %}selected{% endif %}>
                                😞 Struggling
                            </option>

                        </select>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Your thoughts
                        </label>

                        <textarea
                            name="content"
                            class="form-control"
                            rows="14"
                            required>{{ entry.content }}</textarea>

                    </div>

                    <div class="d-flex justify-content-between">

                        <a href="{{ url_for('view_entry',
                                            entry_id=entry.id) }}"
                           class="btn btn-outline-secondary">
                            Cancel
                        </a>

                        <button
                            type="submit"
                            class="btn btn-primary">
                            Save Changes
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
