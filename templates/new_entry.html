{% extends "base.html" %}

{% block title %}New Entry{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card border-0 shadow-sm">

            <div class="card-body p-4">

                <div class="mb-4">

                    <h2 class="mb-1">
                        New Journal Entry
                    </h2>

                    <p class="text-muted mb-0">
                        {{ now.strftime('%A %d %B %Y') if now else '' }}
                    </p>

                </div>

                <form method="POST">

                    <div class="mb-4">

                        <label class="form-label">
                            How are you feeling today?
                        </label>

                        <select
                            name="mood_score"
                            class="form-select"
                            required>

                            <option value="5">😁 Great</option>
                            <option value="4">🙂 Good</option>
                            <option value="3" selected>😐 Okay</option>
                            <option value="2">😔 Low</option>
                            <option value="1">😞 Struggling</option>

                        </select>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Tags (optional)
                        </label>

                        <input
                            type="text"
                            name="tags"
                            class="form-control"
                            placeholder="#Work #Family #Nicola">

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            What's on your mind?
                        </label>

                        <textarea
                            name="content"
                            class="form-control"
                            rows="14"
                            placeholder="Write about your day, your thoughts, your feelings, or anything else you want to remember..."
                            required></textarea>

                    </div>

                    <div class="d-flex justify-content-between">

                        <a href="{{ url_for('dashboard') }}"
                           class="btn btn-outline-secondary">
                            Cancel
                        </a>

                        <button
                            type="submit"
                            class="btn btn-primary">
                            Save Entry
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
