{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-body p-4">

                <h2 class="text-center mb-4">
                    Create Account
                </h2>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>
                    </div>

                    <div class="d-grid">
                        <button
                            type="submit"
                            class="btn btn-success">
                            Create Account
                        </button>
                    </div>

                </form>

                <hr>

                <p class="text-center mb-0">
                    Already have an account?
                    <a href="{{ url_for('login') }}">
                        Login here
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
